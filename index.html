<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fallback Tracks</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>⚡</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=Anybody:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #111110;
  --bg-elevated: #191918;
  --surface:     #1f1f1d;
  --surface-2:   #272725;
  --border:      #2e2e2b;
  --border-light:#3a3a36;
  --text:        #ece8df;
  --text-2:      #b5ad9f;
  --text-3:      #7d7770;
  --accent:      #e8734a;
  --accent-soft: rgba(232,115,74,0.12);
  --accent-hover:#f0845e;
  --green:       #5cb870;
  --radius:      8px;
  --radius-lg:   12px;
  --font-display:'Instrument Serif', Georgia, serif;
  --font-body:   'Anybody', system-ui, sans-serif;
  --font-mono:   'DM Mono', 'Menlo', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); -webkit-font-smoothing: antialiased; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); line-height: 1.5; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; color: inherit; border: none; background: none; outline: none; }
a { color: var(--accent); text-decoration: none; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.app { min-height: 100vh; display: flex; flex-direction: column; }
.nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 80; background: var(--bg);
  backdrop-filter: blur(16px);
}
.nav-logo {
  font-family: var(--font-display); font-size: 26px; color: var(--text);
  display: flex; align-items: baseline; gap: 6px; letter-spacing: -0.3px;
}
.nav-logo i { font-style: italic; color: var(--accent); }
.nav-count {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
  background: var(--surface); padding: 3px 10px; border-radius: 20px;
  margin-left: 12px;
}

.toolbar { padding: 20px 32px 0; display: flex; flex-direction: column; gap: 14px; }
.search-row { display: flex; gap: 12px; align-items: center; }
.search-box {
  flex: 1; display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 0 14px; height: 44px;
  transition: border-color 0.15s;
}
.search-box:focus-within { border-color: var(--accent); }
.search-box svg { flex-shrink: 0; color: var(--text-3); }
.search-box input { flex: 1; height: 100%; font-size: 14px; font-family: var(--font-body); }
.search-box input::placeholder { color: var(--text-3); }
.sort-select {
  height: 44px; padding: 0 32px 0 14px; border-radius: var(--radius);
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-2); font-family: var(--font-mono); font-size: 12px;
  cursor: pointer; appearance: none; -webkit-appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%237d7770' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 12px center;
}
.filter-row {
  display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
  padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.filter-row::-webkit-scrollbar { display: none; }
.chip {
  padding: 6px 14px; border-radius: 20px; font-family: var(--font-mono);
  font-size: 12px; white-space: nowrap; transition: all 0.15s;
  border: 1px solid var(--border); color: var(--text-2);
}
.chip:hover { border-color: var(--text-3); color: var(--text); }
.chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

.track-list { flex: 1; }
.track-list-header, .track {
  display: grid;
  grid-template-columns: 52px 52px 1.4fr 1fr 56px 64px;
  gap: 12px; padding: 10px 32px; align-items: center;
}
.track-list-header {
  padding: 12px 32px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 61px; z-index: 9; background: var(--bg);
}
.col-label {
  font-family: var(--font-mono); font-size: 10px; font-weight: 500;
  color: var(--text-3); text-transform: uppercase; letter-spacing: 1.5px;
  cursor: pointer; user-select: none;
}
.col-label:hover { color: var(--text-2); }
.col-label.active { color: var(--accent); }
.track {
  border-bottom: 1px solid transparent; transition: background 0.1s; cursor: pointer;
}
.track:hover { background: var(--surface); }
.track.playing { background: var(--accent-soft); }
.track:not(:last-child) { border-bottom-color: rgba(255,255,255,0.03); }
.track-play {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-3); font-size: 14px; transition: all 0.12s;
}
.track:hover .track-play, .track.playing .track-play { color: var(--accent); }
.track-play:hover { background: var(--accent-soft); }
.track-art {
  width: 48px; height: 48px; border-radius: 6px;
  overflow: hidden; background: var(--surface-2); flex-shrink: 0;
}
.track-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
.track-art-ph {
  width: 100%; height: 100%; display: flex; align-items: center;
  justify-content: center; font-size: 20px; color: var(--text-3);
}
.track-info { overflow: hidden; }
.track-title {
  font-family: var(--font-body); font-size: 14px; font-weight: 500;
  color: var(--text); white-space: nowrap; text-overflow: ellipsis; overflow: hidden;
  display: flex; align-items: center; gap: 8px;
}
.track.playing .track-title { color: var(--accent); }
.track-sub { font-family: var(--font-mono); font-size: 12px; color: var(--text-3); }
.track-tags { display: flex; gap: 4px; overflow: hidden; flex-wrap: nowrap; }
.track-tag {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
  padding: 2px 8px; border-radius: 10px; background: var(--surface-2);
  white-space: nowrap; flex-shrink: 0;
}
.track-bpm { font-family: var(--font-mono); font-size: 12px; color: var(--text-3); text-align: center; }
.track-dur { font-family: var(--font-mono); font-size: 13px; color: var(--text-3); text-align: right; }
.badge {
  display: inline-block; font-family: var(--font-mono); font-size: 9px;
  padding: 1px 6px; border-radius: 8px; font-weight: 500; flex-shrink: 0;
}
.b-inst { color: var(--green); background: rgba(92,184,112,0.12); border: 1px solid rgba(92,184,112,0.2); }
.b-voc  { color: var(--accent); background: var(--accent-soft); border: 1px solid rgba(232,115,74,0.2); }

/* Grid view */
.grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 16px; padding: 20px 32px;
}
.grid-card {
  border-radius: 10px; overflow: hidden; background: var(--surface);
  border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
}
.grid-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.grid-art { aspect-ratio: 1; background: var(--surface-2); position: relative; overflow: hidden; }
.grid-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
.grid-play {
  position: absolute; bottom: 8px; right: 8px; width: 36px; height: 36px;
  border-radius: 50%; background: var(--accent); border: none; color: #fff;
  font-size: 14px; cursor: pointer; opacity: 0; display: flex;
  align-items: center; justify-content: center; transition: opacity 0.15s;
}
.grid-card:hover .grid-play { opacity: 0.9; }
.grid-info { padding: 10px 12px; }
.grid-title {
  font-family: var(--font-body); font-size: 13px; color: var(--text); font-weight: 500;
  white-space: nowrap; text-overflow: ellipsis; overflow: hidden;
}
.grid-sub { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }

/* Detail panel */
.panel-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 90; animation: fi .2s ease; }
@keyframes fi { from{opacity:0} to{opacity:1} }
.panel {
  position: fixed; top: 0; right: 0; bottom: 0; width: 440px; max-width: 100vw;
  background: var(--bg-elevated); border-left: 1px solid var(--border);
  z-index: 100; overflow-y: auto; animation: si .25s cubic-bezier(.16,1,.3,1);
}
@keyframes si { from{transform:translateX(100%)} to{transform:translateX(0)} }
.panel-head { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px 12px; }
.panel-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 2px; }
.panel-close {
  width: 32px; height: 32px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 18px; color: var(--text-3);
}
.panel-close:hover { background: var(--surface); color: var(--text); }
.panel-body { padding: 0 24px 32px; }
.panel-art {
  width: 100%; aspect-ratio: 1; border-radius: var(--radius-lg);
  overflow: hidden; background: var(--surface); margin-bottom: 24px; position: relative;
}
.panel-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
.panel-play-lg {
  position: absolute; bottom: 16px; right: 16px; width: 56px; height: 56px;
  border-radius: 50%; background: var(--accent); color: #fff; font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
.panel-play-lg:hover { background: var(--accent-hover); }
.panel h2 { font-family: var(--font-display); font-size: 30px; line-height: 1.15; margin-bottom: 4px; letter-spacing: -0.3px; }
.panel-artist { font-family: var(--font-mono); font-size: 13px; color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.panel-meta { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
.ml { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
.mv { font-family: var(--font-body); font-size: 15px; font-weight: 500; }
.mv.sm { font-size: 13px; }
.panel-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.panel-pill { padding: 4px 12px; border-radius: 14px; border: 1px solid var(--border); font-family: var(--font-mono); font-size: 11px; color: var(--text-2); }
.panel-prompt { padding: 14px; background: var(--surface); border-radius: var(--radius); font-family: var(--font-mono); font-size: 12px; color: var(--text-2); line-height: 1.7; }

/* Player */
.player {
  position: fixed; bottom: 0; left: 0; right: 0; height: 72px;
  background: var(--bg-elevated); border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 16px;
  z-index: 150; transform: translateY(100%); transition: transform .3s cubic-bezier(.16,1,.3,1);
}
.player.show { transform: translateY(0); }
.player-art { width: 48px; height: 48px; border-radius: 6px; overflow: hidden; background: var(--surface); flex-shrink: 0; }
.player-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
.player-info { min-width: 80px; max-width: 180px; overflow: hidden; }
.player-title { font-size: 13px; font-weight: 500; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
.player-sub { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
.player-ctrls { display: flex; align-items: center; gap: 8px; }
.cb { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: var(--text-2); font-size: 13px; border-radius: 50%; }
.cb:hover { color: var(--text); background: var(--surface); }
.cb-main { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.cb-main:hover { background: var(--accent-hover); }
.prog-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
.prog-t { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); min-width: 36px; }
.prog-bar { flex: 1; height: 4px; background: var(--surface-2); border-radius: 2px; cursor: pointer; overflow: hidden; }
.prog-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; transition: width 80ms linear; }

/* States */
.state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 32px; text-align: center; animation: fu .4s ease; }
@keyframes fu { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.state-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.35; }
.state h2 { font-family: var(--font-display); font-size: 24px; margin-bottom: 6px; }
.state p { font-family: var(--font-mono); font-size: 13px; color: var(--text-3); max-width: 420px; line-height: 1.6; }
.state code { background: var(--surface-2); padding: 2px 6px; border-radius: 4px; font-size: 12px; color: var(--text-2); }

/* View toggle */
.vtog { display: flex; gap: 4px; background: var(--surface-2); border-radius: 8px; padding: 3px; }
.vb { padding: 6px 12px; border-radius: 6px; font-family: var(--font-mono); font-size: 13px; color: var(--text-3); }
.vb.on { background: var(--border); color: var(--text); }

/* Responsive */
@media (max-width: 768px) {
  .nav { padding: 14px 16px; }
  .toolbar { padding: 16px 16px 0; }
  .track-list-header, .track { grid-template-columns: 44px 44px 1fr 56px; padding-left: 16px; padding-right: 16px; }
  .hsm { display: none !important; }
  .panel { width: 100%; }
  .player { padding: 0 12px; gap: 10px; }
  .prog-wrap { display: none; }
  .nav-logo { font-size: 22px; }
  .grid { padding: 16px; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  .panel-meta { grid-template-columns: repeat(2,1fr); }
}

.app::before {
  content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='0.015'/%3E%3C/svg%3E");
}
</style>
</head>
<body>
<div id="app" class="app"></div>
<script>
// ── State ──
let S = {
  tracks:[], filtered:[], loading:true, error:null,
  search:"", sortBy:"title", sortDir:"asc", activeTag:null, viewMode:"list",
  selected:null, playing:null, isPlaying:false, progress:0, currentTime:0,
};
const audio = new Audio();

// ── Helpers ──
const $=s=>document.querySelector(s);
const fmt=s=>{if(!s)return"--:--";const m=Math.floor(s/60),c=Math.floor(s%60);return m+":"+String(c).padStart(2,"0");};
const fmtD=iso=>{try{return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}catch{return"";}};
function el(tag,a,...k){
  const e=document.createElement(tag);
  if(a)for(const[p,v]of Object.entries(a)){
    if(p==="class")e.className=v;else if(p.startsWith("on"))e.addEventListener(p.slice(2).toLowerCase(),v);
    else if(p==="style"&&typeof v==="object")Object.assign(e.style,v);else if(p==="html")e.innerHTML=v;
    else e.setAttribute(p,v);
  }
  for(const c of k.flat(99)){if(c!=null)e.appendChild(typeof c==="string"?document.createTextNode(c):c);}
  return e;
}

// ── Data ──
async function load(){
  try{
    const r=await fetch("./manifest.json?t="+Date.now());
    if(!r.ok)throw new Error("manifest.json not found ("+r.status+")");
    const d=await r.json();
    S.tracks=d.tracks||[];
  }catch(e){S.error=e.message;}
  S.loading=false; applyFilters(); render();
}

function getAllTags(){
  const m=new Map();
  S.tracks.forEach(t=>(t.displayTags||"").split(",").map(s=>s.trim()).filter(Boolean).forEach(tag=>m.set(tag.toLowerCase(),tag)));
  return[...m.values()].sort();
}

function applyFilters(){
  let t=S.tracks;
  if(S.search){const q=S.search.toLowerCase();t=t.filter(x=>x.title.toLowerCase().includes(q)||x.artist.toLowerCase().includes(q)||(x.tags||"").toLowerCase().includes(q)||(x.displayTags||"").toLowerCase().includes(q)||(x.description||"").toLowerCase().includes(q));}
  if(S.activeTag){const tag=S.activeTag.toLowerCase();t=t.filter(x=>(x.displayTags||"").toLowerCase().includes(tag)||(x.tags||"").toLowerCase().includes(tag));}
  const d=S.sortDir==="asc"?1:-1,s=S.sortBy;
  t=[...t].sort((a,b)=>{
    if(s==="title")return d*a.title.localeCompare(b.title);
    if(s==="artist")return d*a.artist.localeCompare(b.artist);
    if(s==="bpm")return d*((a.bpm||0)-(b.bpm||0));
    if(s==="duration")return d*((a.duration||0)-(b.duration||0));
    if(s==="date")return d*(a.createdAt||"").localeCompare(b.createdAt||"");
    return 0;
  });
  S.filtered=t;
}

// ── Audio ──
function playTrack(t){
  if(S.playing?.id===t.id){togglePlay();return;}
  S.playing=t;S.isPlaying=false;S.progress=0;S.currentTime=0;
  audio.src=t.audioUrl||"";
  audio.play().then(()=>{S.isPlaying=true;render();}).catch(()=>render());
  render();
}
function togglePlay(){
  if(!S.playing)return;
  if(S.isPlaying){audio.pause();S.isPlaying=false;}
  else audio.play().then(()=>{S.isPlaying=true;render();}).catch(()=>{});
  render();
}
function seekTo(e){const r=e.currentTarget.getBoundingClientRect();if(audio.duration)audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;}
function skip(dir){const i=S.filtered.findIndex(t=>t.id===S.playing?.id);const n=i+dir;if(n>=0&&n<S.filtered.length)playTrack(S.filtered[n]);}
audio.addEventListener("timeupdate",()=>{
  if(!audio.duration)return;
  const f=$(".prog-fill"),ct=$("#ct");
  if(f)f.style.width=(audio.currentTime/audio.duration)*100+"%";
  if(ct)ct.textContent=fmt(audio.currentTime);
});
audio.addEventListener("ended",()=>skip(1));

function setSort(c){if(S.sortBy===c)S.sortDir=S.sortDir==="asc"?"desc":"asc";else{S.sortBy=c;S.sortDir="asc";}applyFilters();render();}

// ── Render ──
function render(){
  const app=$("#app"); app.innerHTML="";
  const tags=getAllTags();

  // Nav
  const nav=el("nav",{class:"nav"},
    el("div",{style:{display:"flex",alignItems:"center"}},
      el("div",{class:"nav-logo"},el("i",null,"⚡")," Fallback Tracks"),
      S.tracks.length?el("span",{class:"nav-count"},S.tracks.length+" tracks"):null),
    el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}})
  );
  app.appendChild(nav);

  // Toolbar
  if(S.tracks.length>0){
    const tb=el("div",{class:"toolbar"});
    const sr=el("div",{class:"search-row"});
    const sb=el("div",{class:"search-box"},el("span",{html:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>'}));
    const inp=el("input",{type:"text",placeholder:"Search tracks, artists, tags, moods…",value:S.search});
    inp.addEventListener("input",e=>{S.search=e.target.value;applyFilters();render();});
    sb.appendChild(inp);

    const sel=el("select",{class:"sort-select"});
    [["title","Title A–Z"],["artist","Artist"],["bpm","BPM"],["duration","Duration"],["date","Date Added"]].forEach(([v,l])=>{
      const o=el("option",{value:v},l);if(v===S.sortBy)o.selected=true;sel.appendChild(o);
    });
    sel.addEventListener("change",e=>{S.sortBy=e.target.value;applyFilters();render();});

    const vt=el("div",{class:"vtog"});
    ["list","grid"].forEach(v=>vt.appendChild(el("button",{class:"vb"+(S.viewMode===v?" on":""),onClick:()=>{S.viewMode=v;render();}},v==="list"?"☰":"▦")));

    sr.append(sb,sel,vt);
    tb.appendChild(sr);

    if(tags.length>0){
      const fr=el("div",{class:"filter-row"});
      fr.appendChild(el("button",{class:"chip"+(S.activeTag?"":" active"),onClick:()=>{S.activeTag=null;applyFilters();render();}},"All"));
      tags.forEach(t=>fr.appendChild(el("button",{class:"chip"+(S.activeTag===t?" active":""),onClick:()=>{S.activeTag=S.activeTag===t?null:t;applyFilters();render();}},t)));
      tb.appendChild(fr);
    }
    app.appendChild(tb);
  }

  // Content
  const content=el("div",{class:"track-list",style:{paddingBottom:S.playing?"84px":"0"}});

  if(S.loading){
    content.appendChild(el("div",{class:"state"},el("div",{class:"state-icon"},"◎"),el("h2",null,"Loading library…"),el("p",null,"Reading manifest")));
  }else if(S.error){
